name: CI

on:
  push:
    branches: [main, master, "feature/**", "feat/**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Host unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcovr
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Coverage report
        run: |
          gcovr --root . --filter 'src/calc/' --filter 'src/config/' --filter 'src/measure/' \
                --txt --xml-pretty -o coverage.xml --print-summary
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  firmware-build:
    name: Firmware build (arm-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: "13.3.Rel1"
      - name: Install CMake/Ninja
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Configure
        run: >
          cmake -S . -B build-fw -G Ninja
          -DCMAKE_TOOLCHAIN_FILE=cmake/gcc-arm-none-eabi.cmake
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build-fw
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build-fw/firmware.elf
            build-fw/firmware.bin
            build-fw/firmware.hex
            build-fw/firmware.map

  lint-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      # Pin the exact clang-format used during development so the check is
      # reproducible and free of formatter-version skew.
      - name: Install clang-format
        run: pip install "clang-format==22.1.5"
      - name: Check formatting
        run: >
          find src tests bsp \( -name '*.c' -o -name '*.h' \) -print0
          | xargs -0 clang-format --dry-run --Werror

  static-analysis:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: >
          cppcheck --enable=warning,portability
          --std=c99 --language=c --error-exitcode=1 --inline-suppr
          --suppress=missingIncludeSystem -I src src
